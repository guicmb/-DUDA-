<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunta Importante</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #ffd1d1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 380px;
            z-index: 10;
            position: relative;
        }
        
        h1 {
            color: #ff4a5a;
            font-size: 24px;
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .botoes {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            height: 60px;
        }
        
        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
        }
        
        .btn-sim-estilo {
            background-color: #ff4a5a;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 74, 90, 0.4);
            transition: transform 0.1s;
        }
        
        .btn-sim-estilo:active {
            transform: scale(0.95);
        }
        
        #btn-nao {
            background-color: #e0e0e0;
            color: #666;
            position: relative;
            animation: voarBotao 4s infinite alternate ease-in-out;
        }
        
        @keyframes voarBotao {
            0% { transform: translate(0, 0); }
            25% { transform: translate(60px, -40px); }
            50% { transform: translate(-50px, 30px); }
            75% { transform: translate(40px, 50px); }
            100% { transform: translate(-60px, -30px); }
        }
        
        /* Container do Carrossel de Fotos */
        .foto-container {
            display: none;
            position: relative;
            width: 100%;
        }

        .carrossel {
            display: flex;
            overflow: hidden;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
            margin-top: 15px;
        }

        .slide {
            min-width: 100%;
            transition: transform 0.5s ease-in-out;
            display: block;
        }

        .slide img {
            width: 100%;
            display: block;
            border-radius: 15px;
        }

        /* Estilo da Seta Romântica e Suave */
        .seta-proximo {
            position: absolute;
            right: -10px;
            top: 55%;
            transform: translateY(-50%);
            background-color: rgba(255, 74, 90, 0.85);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 20;
            padding: 0;
            animation: balancoSeta 1.5s infinite ease-in-out;
        }
